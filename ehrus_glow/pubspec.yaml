name: ehrus_glow
description: Jewellery inventory and sales management app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.8.0
  cloud_firestore: ^5.5.0

  # UI & Design
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0
  provider: ^6.1.2
  share_plus: ^10.1.4
  csv: ^6.0.0
  path_provider: ^2.1.5
  # Remove: image_picker, http, cloudinary_public

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/