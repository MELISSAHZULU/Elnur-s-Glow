name: ehrus_glow
description: Jewellery inventory and sales management app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"  # ← THIS IS THE FIX

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core (without auth - simpler)
  firebase_core: ^3.8.0
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.0

  # UI & Design
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # State Management & Utilities
  provider: ^6.1.2
  intl: ^0.19.0
  share_plus: ^10.1.4
  csv: ^6.0.0
  path_provider: ^2.1.5
  file_picker: ^8.1.4
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/